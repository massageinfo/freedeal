<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Free Internet Offer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
background-image:
radial-gradient(circle at top,#1d4ed8 0%,transparent 40%),
radial-gradient(circle at bottom,#7c3aed 0%,transparent 40%);
padding:15px;
color:#fff;
}

.container{
max-width:500px;
margin:auto;
}

.banner{
width:100%;
margin-bottom:20px;
}

.banner img{
width:100%;
display:block;
border-radius:22px;
box-shadow:
0 0 25px rgba(59,130,246,.5),
0 0 50px rgba(168,85,247,.3);
}

.offer-box{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
border-radius:20px;
padding:15px;
text-align:center;
margin-bottom:20px;
backdrop-filter:blur(15px);
}

.offer-box h2{
font-size:24px;
color:#FFD700;
margin-bottom:8px;
}

.offer-box p{
font-size:14px;
color:#d1d5db;
}

.heading{
text-align:center;
font-size:26px;
font-weight:700;
margin-bottom:18px;
}

.network-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.network-card{
background:rgba(255,255,255,.06);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.12);
border-radius:24px;
padding:20px 10px;
text-align:center;
text-decoration:none;
transition:.35s;
box-shadow:0 0 15px rgba(59,130,246,.15);
}

.network-card:hover{
transform:translateY(-5px);
box-shadow:
0 0 20px #3b82f6,
0 0 40px #7c3aed;
}

.logo-wrap{
width:90px;
height:90px;
border-radius:50%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
overflow:hidden;
}

.logo-wrap img{
width:80px;
height:80px;
object-fit:contain;
}

.network-name{
margin-top:12px;
font-size:20px;
font-weight:bold;
color:#fff;
}

.network-desc{
font-size:12px;
margin-top:4px;
color:#cbd5e1;
}

.bottom-note{
margin-top:25px;
text-align:center;
font-size:12px;
color:#94a3b8;
}

.pulse{
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

</style>

</head>

<body>

<div class="container">

<!-- TOP BANNER -->

<div class="banner">
<img src="https://64.media.tumblr.com/46563edb6517e4f8533c759a60ea162b/3190ceca439957c9-e4/s2048x3072/36e6bab8c9aeadd0ee49a7c8b947e081ce66525f.pnj" alt="Free 100GB Internet">
</div>

<!-- OFFER -->

<div class="offer-box pulse">
<h2>100GB FREE INTERNET</h2>
<p>Select your mobile network to continue</p>
</div>

<h1 class="heading">
Choose Your Network
</h1>

<div class="network-grid">

<a href="YOUR_JIO_URL" class="network-card">
<div class="logo-wrap">
<img src="jio.png">
</div>
<div class="network-name">Jio</div>
<div class="network-desc">Fast 4G & 5G</div>
</a>

<a href="YOUR_AIRTEL_URL" class="network-card">
<div class="logo-wrap">
<img src="airtel.png">
</div>
<div class="network-name">Airtel</div>
<div class="network-desc">India's Trusted Network</div>
</a>

<a href="YOUR_VI_URL" class="network-card">
<div class="logo-wrap">
<img src="vi.png">
</div>
<div class="network-name">Vi</div>
<div class="network-desc">Vodafone Idea</div>
</a>

<a href="YOUR_BSNL_URL" class="network-card">
<div class="logo-wrap">
<img src="bsnl.png">
</div>
<div class="network-name">BSNL</div>
<div class="network-desc">Government Network</div>
</a>

</div>

<div class="bottom-note">
Works on all major Indian telecom networks
</div>

</div>

</body>
</html>
